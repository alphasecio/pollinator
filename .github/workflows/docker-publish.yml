name: Publish Docker image

# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`,
# or publishing a GitHub Release with a new tag through the web UI) — not on
# every push to main, since self-hosters pulling this image want a stable,
# predictable version to pin to, not whatever the latest commit happens to
# be. workflow_dispatch is a second, manual way in: a "Run workflow" button
# in the Actions tab, useful for testing without committing to a real tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the image tag (e.g. 1.0.0, no leading v)"
        required: true
        type: string

permissions:
  contents: read
  packages: write # required for GITHUB_TOKEN to push to GHCR — not granted by default

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cross-compilation for arm64 happens natively in the Dockerfile's Go
      # build step (CGO_ENABLED=0, so no C toolchain needed) — QEMU here is
      # only for running/testing that architecture during the build itself,
      # not for the actual compilation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pollinator:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/pollinator:latest
